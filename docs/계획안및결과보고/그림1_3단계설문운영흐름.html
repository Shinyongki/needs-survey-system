<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #ffffff; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .wrap { padding: 60px; }
</style>
</head>
<body>
<div class="wrap">
<svg width="760" height="190" viewBox="0 0 760 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#333333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="30" y="20" width="206" height="150" rx="8" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#555555" x="133" y="50" text-anchor="middle">1단계 · 4월</text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="17" font-weight="bold" fill="#1a1a1a" x="133" y="80" text-anchor="middle">상반기 통합설문</text>
  <line x1="55" y1="95" x2="211" y2="95" stroke="#cccccc" stroke-width="0.8"/>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#444444" x="133" y="120" text-anchor="middle">기초 욕구·현황 파악</text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#444444" x="133" y="148" text-anchor="middle">→ 당해 계획 근거</text>
  <line x1="236" y1="95" x2="264" y2="95" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="267" y="20" width="206" height="150" rx="8" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#555555" x="370" y="50" text-anchor="middle">2단계 · 사업 종료 직후</text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="17" font-weight="bold" fill="#1a1a1a" x="370" y="80" text-anchor="middle">현장설문 16종</text>
  <line x1="292" y1="95" x2="448" y2="95" stroke="#aaaaaa" stroke-width="0.8"/>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#444444" x="370" y="120" text-anchor="middle">만족도·경험 수렴</text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#444444" x="370" y="148" text-anchor="middle">→ 결과보고서</text>
  <line x1="473" y1="95" x2="501" y2="95" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="504" y="20" width="226" height="150" rx="8" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#555555" x="617" y="50" text-anchor="middle">3단계 · 11~12월</text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="17" font-weight="bold" fill="#1a1a1a" x="617" y="80" text-anchor="middle">하반기 통합설문</text>
  <line x1="529" y1="95" x2="705" y2="95" stroke="#cccccc" stroke-width="0.8"/>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#444444" x="617" y="120" text-anchor="middle">연간 환류·욕구 파악</text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="bold" fill="#444444" x="617" y="148" text-anchor="middle">→ 차기 계획 근거</text>
</svg>
</div>
</body>
</html>
